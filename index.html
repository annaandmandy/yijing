<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-Ching Lab | 沉浸式 3D 抽爻</title>
    <link rel="stylesheet" href="./src/styles/main.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-mode">
    <div id="app">
        <!-- Navigation Bar -->
        <nav class="glass-nav">
            <div class="logo">I-Ching Lab</div>
            <div class="nav-links">
                <a href="#tabletop" class="active">抽爻 Tabletop</a>
                <a href="#library">圖書館 Library</a>
                <a href="#history">每日紀錄 Journal</a>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="view-container">
            <!-- 3D Tabletop View -->
            <section id="tabletop" class="view active">
                <div class="question-container">
                    <input type="text" id="user-question" placeholder="輸入你想問的事（例如：今日運勢、創業建議）..." class="glass-input">
                </div>
                <div id="canvas-container">
                    <!-- Three.js Canvas will be injected here -->
                    <div class="instruction">震動手機或按住拖拽以投擲</div>
                    <!-- Real-time Hexagram Progress -->
                    <div id="casting-progress" class="glass-panel"></div>
                </div>
                <!-- Hexagram Result Overlay -->
                <div id="result-overlay" class="hidden glass-panel">
                    <div class="binary-display"></div>
                    <h1 class="hex-name">--</h1>
                    
                    <!-- Target Focus Selection -->
                    <div class="focus-selectors">
                        <small>針對特定的事分析：</small>
                        <div class="btn-group">
                            <button class="btn-focus" data-type="career">問事業</button>
                            <button class="btn-focus" data-type="wealth">問金錢</button>
                            <button class="btn-focus" data-type="love">問感情</button>
                        </div>
                    </div>

                    <!-- Najia Info List -->
                    <div id="najia-info" class="hidden">
                        <div class="palace-info"></div>
                        <div class="lines-najia"></div>
                    </div>

                    <p class="hex-summary"></p>
                    <button id="view-details" class="btn-primary">查看詳解</button>
                    <button id="re-toss" class="btn-secondary">再次投擲</button>
                </div>
            </section>

            <!-- Library View -->
            <section id="library" class="view">
                <div class="header">
                    <h2>全卦圖書館</h2>
                    <div class="filters">
                        <!-- Elemental filters will go here -->
                    </div>
                </div>
                <div id="hex-grid" class="grid-container">
                    <!-- 64 hexagrams will be generated here -->
                </div>
            </section>

            <!-- History View -->
            <section id="history" class="view">
                <div class="header">
                    <h2>每日抽爻紀錄</h2>
                </div>
                <div id="history-container">
                    <div class="stats-card glass-panel">
                        <h3>能量分佈</h3>
                        <canvas id="radar-chart"></canvas>
                    </div>
                    <div class="history-list">
                        <!-- History items will be listed here -->
                    </div>
                </div>
            </section>
        </main>

        <!-- Detail Modal -->
        <div id="detail-modal" class="modal">
            <div class="modal-content glass-panel">
                <span class="close-btn">&times;</span>
                <div class="modal-body">
                    <!-- Dynamic content will be injected here -->
                </div>
                <!-- Chat Interface -->
                <div id="ai-chat-container" class="glass-panel hidden">
                    <div class="chat-header">
                        <h4>AI 導師對話</h4>
                        <span class="chat-status">感應中...</span>
                    </div>
                    <div id="chat-history" class="chat-scroll">
                        <!-- Messages will appear here -->
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="向導師請教更多細節...">
                        <button id="send-chat" class="btn-icon">➤</button>
                    </div>
                </div>
                
                <button id="ask-ai" class="btn-primary">詢問 AI 導師</button>
            </div>
        </div>
    </div>

    <!-- Main JS entry -->
    <script type="module" src="src/app.js"></script>
</body>
</html>
